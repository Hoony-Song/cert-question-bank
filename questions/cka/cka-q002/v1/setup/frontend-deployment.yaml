apiVersion: v1
kind: Namespace
metadata:
  name: autoscale-lab
  labels:
    cert-platform.io/question-id: cka-q002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-nginx
  namespace: autoscale-lab
  labels:
    app: web-nginx
    cert-platform.io/question-id: cka-q002
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-nginx
  template:
    metadata:
      labels:
        app: web-nginx
        cert-platform.io/question-id: cka-q002
    spec:
      containers:
        - name: web
          image: registry.k8s.io/pause:3.7
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
