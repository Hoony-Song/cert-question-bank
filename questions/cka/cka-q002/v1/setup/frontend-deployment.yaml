apiVersion: v1
kind: Namespace
metadata:
  name: autoscale-lab
  labels:
    cert-platform.io/question-id: cka-q002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-frontend
  namespace: autoscale-lab
  labels:
    app: web-frontend
    cert-platform.io/question-id: cka-q002
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-frontend
  template:
    metadata:
      labels:
        app: web-frontend
        cert-platform.io/question-id: cka-q002
    spec:
      containers:
        - name: web
          image: nginx:1.27
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
