apiVersion: cert-platform.io/v1alpha1
kind: GradingCheck
metadata:
  questionId: cka-q010
spec:
  targetCluster: cka-vm
  namespace: routing-lab
  maxScore: 10
  checks:
    - id: httproute-exists
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
    - id: httproute-parent
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.parentRefs[0].name
      equals: routing-gateway
    - id: httproute-host
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.hostnames[0]
      equals: catalog.apps.local
    - id: httproute-path
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.rules[0].matches[0].path.value
      equals: /catalog
    - id: httproute-path-type
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.rules[0].matches[0].path.type
      equals: PathPrefix
    - id: httproute-backend
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.rules[0].backendRefs[0].name
      equals: catalog-api
    - id: httproute-port
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        name: catalog-route
      path: $.spec.rules[0].backendRefs[0].port
      equals: 8080
    - id: legacy-ingress-absent
      type: kubernetes-object-absent
      points: 2
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: legacy-ingress
