apiVersion: cert-platform.io/v1alpha1
kind: GradingCheck
metadata:
  questionId: cka-q010
spec:
  targetCluster: cka-kind
  namespace: routing-lab
  maxScore: 10
  checks:
    - id: ingress-exists
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
    - id: ingress-class
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.ingressClassName
      equals: nginx
    - id: ingress-host
      type: jsonpath-equals
      points: 2
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.rules[0].host
      equals: catalog.apps.local
    - id: ingress-path
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.rules[0].http.paths[0].path
      equals: /catalog
    - id: ingress-path-type
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.rules[0].http.paths[0].pathType
      equals: Prefix
    - id: ingress-backend
      type: jsonpath-equals
      points: 2
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.rules[0].http.paths[0].backend.service.name
      equals: catalog-api
    - id: ingress-port
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        name: catalog-ingress
      path: $.spec.rules[0].http.paths[0].backend.service.port.number
      equals: 8080
