apiVersion: cert-platform.io/v1alpha1
kind: GradingCheck
metadata:
  questionId: cka-q014
spec:
  targetCluster: cka-vm
  namespace: tigera-operator
  maxScore: 10
  checks:
    - id: tigera-namespace
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: v1
        kind: Namespace
        name: tigera-operator
    - id: tigera-deployment
      type: kubernetes-object-exists
      points: 3
      object:
        apiVersion: apps/v1
        kind: Deployment
        name: tigera-operator
    - id: tigera-serviceaccount
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: v1
        kind: ServiceAccount
        name: tigera-operator
    - id: tigera-installation-crd
      type: kubernetes-object-exists
      points: 3
      object:
        apiVersion: apiextensions.k8s.io/v1
        kind: CustomResourceDefinition
        name: installations.operator.tigera.io
