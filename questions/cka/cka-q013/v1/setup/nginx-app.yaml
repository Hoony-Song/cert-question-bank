apiVersion: v1
kind: Namespace
metadata:
  name: secure-web
  labels:
    cert-platform.io/question-id: cka-q013
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-tls-config
  namespace: secure-web
  labels:
    cert-platform.io/question-id: cka-q013
immutable: true
data:
  ssl_protocols: "TLSv1.2 TLSv1.3"
  ssl_ciphers: "HIGH:!aNULL:!MD5"
  client_max_body_size: "1m"
  keepalive_timeout: "30"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: secure-web
  labels:
    app: edge-nginx
    cert-platform.io/question-id: cka-q013
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edge-nginx
  template:
    metadata:
      labels:
        app: edge-nginx
        cert-platform.io/question-id: cka-q013
    spec:
      containers:
        - name: nginx
          image: registry.k8s.io/pause:3.9
          envFrom:
            - configMapRef:
                name: edge-tls-config
