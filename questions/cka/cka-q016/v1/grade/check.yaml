apiVersion: cert-platform.io/v1alpha1
kind: GradingCheck
metadata:
  questionId: cka-q016
spec:
  targetCluster: cka-vm
  namespace: kube-system
  maxScore: 10
  checks:
    - id: scheduler-cpu-request
      type: remote-command
      points: 4
      node: cka0001
      command: |
        set -euo pipefail
        scheduler_pod=$(kubectl --context cka-vm -n kube-system get pods -l component=kube-scheduler -o jsonpath='{.items[0].metadata.name}')
        if [[ -z "$scheduler_pod" ]]; then
          exit 1
        fi

        scheduler_cpu=$(kubectl --context cka-vm -n kube-system get pod "$scheduler_pod" -o jsonpath='{.spec.containers[0].resources.requests.cpu}')
        if [[ "$scheduler_cpu" == "200m" || "$scheduler_cpu" == "0.2" ]]; then
          exit 0
        fi
        exit 1
    - id: apiserver-flag-profiling
      type: remote-command
      points: 2
      node: cka0001
      command: |
        set -euo pipefail
        apiserver_pod=$(kubectl --context cka-vm -n kube-system get pods -l component=kube-apiserver -o jsonpath='{.items[0].metadata.name}')
        if [[ -z "$apiserver_pod" ]]; then
          exit 1
        fi

        args=$(kubectl --context cka-vm -n kube-system get pod "$apiserver_pod" -o jsonpath='{.spec.containers[0].command}{" "}{range .spec.containers[0].args[*]}{.}{" "}{end}')
        if printf '%s\n' "$args" | grep -q -- '--profiling=false'; then
          exit 0
        fi
        exit 1
    - id: apiserver-flag-verbosity
      type: remote-command
      points: 2
      node: cka0001
      command: |
        set -euo pipefail
        apiserver_pod=$(kubectl --context cka-vm -n kube-system get pods -l component=kube-apiserver -o jsonpath='{.items[0].metadata.name}')
        if [[ -z "$apiserver_pod" ]]; then
          exit 1
        fi

        args=$(kubectl --context cka-vm -n kube-system get pod "$apiserver_pod" -o jsonpath='{.spec.containers[0].command}{" "}{range .spec.containers[0].args[*]}{.}{" "}{end}')
        if printf '%s\n' "$args" | grep -q -- '--v=4'; then
          exit 0
        fi
        exit 1
    - id: apiserver-flag-timeout
      type: remote-command
      points: 2
      node: cka0001
      command: |
        set -euo pipefail
        apiserver_pod=$(kubectl --context cka-vm -n kube-system get pods -l component=kube-apiserver -o jsonpath='{.items[0].metadata.name}')
        if [[ -z "$apiserver_pod" ]]; then
          exit 1
        fi

        args=$(kubectl --context cka-vm -n kube-system get pod "$apiserver_pod" -o jsonpath='{.spec.containers[0].command}{" "}{range .spec.containers[0].args[*]}{.}{" "}{end}')
        if printf '%s\n' "$args" | grep -q -- '--request-timeout=300s'; then
          exit 0
        fi
        exit 1
