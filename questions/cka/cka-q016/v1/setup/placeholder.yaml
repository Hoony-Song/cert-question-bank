apiVersion: v1
kind: Namespace
metadata:
  name: repair-lab
  labels:
    cert-platform.io/question-id: cka-q016
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-api
  namespace: repair-lab
  labels:
    app: metrics-api
    cert-platform.io/question-id: cka-q016
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-api
  template:
    metadata:
      labels:
        app: metrics-api
        cert-platform.io/question-id: cka-q016
    spec:
      containers:
        - name: api
          image: nginx:bad-tag
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-api-svc
  namespace: repair-lab
  labels:
    cert-platform.io/question-id: cka-q016
spec:
  selector:
    app: wrong-api
  ports:
    - port: 9090
      targetPort: 8080
