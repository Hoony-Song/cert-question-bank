apiVersion: v1
kind: Namespace
metadata:
  name: service-lab
  labels:
    cert-platform.io/question-id: cka-q006
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: service-lab
  labels:
    app: inventory-api
    cert-platform.io/question-id: cka-q006
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
        cert-platform.io/question-id: cka-q006
    spec:
      containers:
        - name: api
          image: registry.k8s.io/pause:3.7
          ports:
          - containerPort: 80
            protocol: TCP
