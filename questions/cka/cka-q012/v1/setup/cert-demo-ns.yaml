apiVersion: v1
kind: Namespace
metadata:
  name: tls-demo
  labels:
    cert-platform.io/question-id: cka-q012
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secure-app
  namespace: tls-demo
  labels:
    app: secure-app
    cert-platform.io/question-id: cka-q012
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secure-app
  template:
    metadata:
      labels:
        app: secure-app
        cert-platform.io/question-id: cka-q012
    spec:
      containers:
        - name: app
          image: nginx:1.27
          ports:
            - containerPort: 8443
---
apiVersion: v1
kind: Service
metadata:
  name: secure-svc
  namespace: tls-demo
  labels:
    cert-platform.io/question-id: cka-q012
spec:
  selector:
    app: secure-app
  ports:
    - port: 8443
      targetPort: 8443
