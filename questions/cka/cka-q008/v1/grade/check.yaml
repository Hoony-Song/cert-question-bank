apiVersion: cert-platform.io/v1alpha1
kind: GradingCheck
metadata:
  questionId: cka-q008
spec:
  targetCluster: cka-kind
  namespace: metrics-server
  maxScore: 10
  checks:
    - id: deployment-exists
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: apps/v1
        kind: Deployment
        name: metrics-server
    - id: deployment-replicas
      type: jsonpath-equals
      points: 1
      object:
        apiVersion: apps/v1
        kind: Deployment
        name: metrics-server
      path: $.spec.replicas
      equals: 2
    - id: service-exists
      type: kubernetes-object-exists
      points: 2
      object:
        apiVersion: v1
        kind: Service
        name: metrics-server
    - id: service-port
      type: jsonpath-equals
      points: 3
      object:
        apiVersion: v1
        kind: Service
        name: metrics-server
      path: $.spec.ports[0].port
      equals: 80
    - id: managed-by-helm
      type: jsonpath-equals
      points: 2
      object:
        apiVersion: apps/v1
        kind: Deployment
        name: metrics-server
      path: $.metadata.labels.app\.kubernetes\.io/managed-by
      equals: Helm
