apiVersion: v1
kind: Namespace
metadata:
  name: logging-lab
  labels:
    cert-platform.io/question-id: cka-q004
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: audit-worker
  namespace: logging-lab
  labels:
    app: audit-worker
    cert-platform.io/question-id: cka-q004
spec:
  replicas: 1
  selector:
    matchLabels:
      app: audit-worker
  template:
    metadata:
      labels:
        app: audit-worker
        cert-platform.io/question-id: cka-q004
    spec:
      containers:
        - name: worker
          image: busybox:1.36
          command: ["/bin/sh", "-c"]
          args:
            - "mkdir -p /var/log/audit && while true; do echo audit-event >> /var/log/audit/audit.log; sleep 5; done"
